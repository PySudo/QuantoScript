name: Feature request
description: Suggest a language feature, stdlib addition, or tooling improvement
title: "[feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or limitation you're running into.
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What should QuantoScript do? Include syntax or API sketches if relevant.
      render: qscript
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Language / syntax
        - Standard library
        - Bytecode VM
        - Native compiler
        - CLI / tooling
        - Package manager
        - Documentation
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about, and why this one is better.
    validations:
      required: false
