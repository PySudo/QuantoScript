name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    name: Build & test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4

      - name: Install OpenSSL (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libssl-dev

      - name: Install OpenSSL (macOS)
        if: runner.os == 'macOS'
        run: brew install openssl@3

      - name: Setup MSYS2 (Windows)
        if: runner.os == 'Windows'
        uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: mingw-w64-x86_64-gcc mingw-w64-x86_64-openssl mingw-w64-x86_64-pkgconf make

      - name: Build
        if: runner.os != 'Windows'
        run: make

      - name: Build (MSYS2)
        if: runner.os == 'Windows'
        shell: msys2 {0}
        run: make

      - name: Run regression suite
        if: runner.os != 'Windows'
        shell: pwsh
        run: |
          .\tests\run_regression.ps1 -Verbose
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Run regression suite (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\tests\run_regression.ps1 -Verbose
          if ($LASTEXITCODE -ne 0) { exit 1 }

      - name: Upload regression log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-log-${{ matrix.os }}
          path: |
            build/
            tests/*.qvm
          retention-days: 5
